<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Princess Pink Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="app-container">
        <h1 class="title">✨ Princess Pink Calculator ✨</h1>
        <div class="calculator">
            <input type="text" id="display" class="display" readonly placeholder="0" />
            <div class="buttons-grid">
                <button class="btn" data-value="7">7</button>
                <button class="btn" data-value="8">8</button>
                <button class="btn" data-value="9">9</button>
                <button class="btn operator" data-value="/">÷</button>
                <button class="btn" data-value="4">4</button>
                <button class="btn" data-value="5">5</button>
                <button class="btn" data-value="6">6</button>
                <button class="btn operator" data-value="*">×</button>
                <button class="btn" data-value="1">1</button>
                <button class="btn" data-value="2">2</button>
                <button class="btn" data-value="3">3</button>
                <button class="btn operator" data-value="-">−</button>
                <button class="btn" data-value="0">0</button>
                <button class="btn" data-value=".">.</button>
                <button class="btn" id="clear">C</button>
                <button class="btn operator" data-value="+">+</button>
                <button class="btn equal" id="equals" colspan="4">=</button>
            </div>
        </div>
        <div class="image-filter-section">
            <h2>Princess Gallery (just for fun)</h2>
            <div class="princess-gallery">
                <img src="princess1.png" alt="Princess 1" class="princess-img" />
                <img src="princess2.png" alt="Princess 2" class="princess-img" />
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
